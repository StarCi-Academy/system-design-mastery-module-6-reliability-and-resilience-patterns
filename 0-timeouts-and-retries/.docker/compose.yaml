# =============================================================================
# Docker Compose — lesson `0-timeouts-and-retries` (client-service + bank-service).
# (EN: Docker Compose — lesson `0-timeouts-and-retries` (client-service + bank-service).)
#
# Làm việc trong thư mục chứa file này: `.../0-timeouts-and-retries/.docker/`
# (EN: Run commands from this file's directory: `.../0-timeouts-and-retries/.docker/`)
#
# Compose tự tạo network `0-timeouts-and-retries` khi `up` (không cần `docker network create`).
# (EN: Compose creates network `0-timeouts-and-retries` on `up` (no manual `docker network create`).)
#
# Khởi chạy nền:
# (EN: Start detached:)
#     docker compose up -d
#
# Xem log client-service / bank-service:
# (EN: Tail client-service / bank-service logs:)
#     docker compose logs -f client-service
#     docker compose logs -f bank-service
#
# Dừng và gỡ container (network do Compose quản lý thường bị xóa kèm `down`, trừ khi đang được container khác dùng).
# (EN: Stop/remove containers (Compose-managed network is usually removed with `down`, unless another container still uses it).)
#     docker compose down
# =============================================================================

# Tiền tố project Compose (tên stack / tiền tố container).
# (EN: Compose project prefix (stack / container name prefix).)
name: 0-timeouts-and-retries

services:
  # Bank service — giả lập dịch vụ ngân hàng xử lý chậm 10 giây để kích hoạt Timeout.
  # (EN: Bank service — simulates a slow bank processing 10s to trigger Timeout.)
  bank-service:
    image: starciacademy/reliability-and-resilience-patterns-timeouts-bank-service:latest
    ports:
      # Ánh xạ cổng host 3001 → container 3001 (HTTP API bank).
      # (EN: Map host port 3001 → container 3001 (HTTP API bank).)
      - "3001:3001"
    networks:
      - "0-timeouts-and-retries"

  # Client service — gọi bank-service với Timeout 3s và Retry (Exponential Backoff + Jitter).
  # (EN: Client service — calls bank-service with 3s Timeout and Retry (Exponential Backoff + Jitter).)
  client-service:
    image: starciacademy/reliability-and-resilience-patterns-timeouts-client-service:latest
    depends_on:
      # Khởi động sau bank-service (thứ tự khởi tạo; không chờ healthy).
      # (EN: Starts after bank-service (startup order; no health-aware wait).)
      - bank-service
    ports:
      # Ánh xạ cổng host 3000 → container 3000 (HTTP API client).
      # (EN: Map host port 3000 → container 3000 (HTTP API client).)
      - "3000:3000"
    networks:
      - "0-timeouts-and-retries"

# Network do Compose tạo; `name` đặt tên trên Docker trùng lesson (không `external`).
# (EN: Compose-managed network; `name` sets Docker network name to match lesson (not `external`).)
networks:
  "0-timeouts-and-retries":
    name: "0-timeouts-and-retries"
