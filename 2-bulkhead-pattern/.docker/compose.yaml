# =============================================================================
# Docker Compose — lesson `2-bulkhead-pattern` (ecommerce-api).
# (EN: Docker Compose — lesson `2-bulkhead-pattern` (ecommerce-api).)
#
# Làm việc trong thư mục chứa file này: `.../2-bulkhead-pattern/.docker/`
# (EN: Run commands from this file's directory: `.../2-bulkhead-pattern/.docker/`)
#
# Compose tự tạo network `2-bulkhead-pattern` khi `up` (không cần `docker network create`).
# (EN: Compose creates network `2-bulkhead-pattern` on `up` (no manual `docker network create`).)
#
# Khởi chạy nền:
# (EN: Start detached:)
#     docker compose up -d
#
# Xem log ecommerce-api:
# (EN: Tail ecommerce-api logs:)
#     docker compose logs -f ecommerce-api
#
# Dừng và gỡ container (network do Compose quản lý thường bị xóa kèm `down`, trừ khi đang được container khác dùng).
# (EN: Stop/remove containers (Compose-managed network is usually removed with `down`, unless another container still uses it).)
#     docker compose down
# =============================================================================

# Tiền tố project Compose (tên stack / tiền tố container).
# (EN: Compose project prefix (stack / container name prefix).)
name: 2-bulkhead-pattern

services:
  # Ecommerce API — NestJS service phân tách tài nguyên xử lý đồng thời giữa History (max 2) và Checkout (không giới hạn).
  # (EN: Ecommerce API — NestJS service partitioning concurrent resources between History (max 2) and Checkout (unlimited).)
  ecommerce-api:
    build:
      context: ../ecommerce-api
    environment:
      PORT: 3000
      HISTORY_CONCURRENCY_LIMIT: 2
      HISTORY_PROCESSING_DELAY_MS: 5000
    ports:
      # Ánh xạ cổng host 3000 → container 3000 (HTTP API).
      # (EN: Map host port 3000 → container 3000 (HTTP API).)
      - "3000:3000"
    networks:
      - "2-bulkhead-pattern"

# Network do Compose tạo; `name` đặt tên trên Docker trùng lesson (không `external`).
# (EN: Compose-managed network; `name` sets Docker network name to match lesson (not `external`).)
networks:
  "2-bulkhead-pattern":
    name: "2-bulkhead-pattern"
