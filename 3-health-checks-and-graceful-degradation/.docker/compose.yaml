name: 3-health-checks-and-graceful-degradation

services:
  # NestJS demo app cho Health Check + Graceful Degradation.
  # (EN: NestJS demo app for Health Check + Graceful Degradation.)
  ecommerce-app:
    build:
      context: ../ecommerce-app
    environment:
      PORT: 3000
      DEGRADE_HEAP_THRESHOLD_MB: 120
      HEALTH_HEAP_THRESHOLD_BYTES: 209715200
      DATABASE_HEALTH_STATUS: up
    ports:
      - "3000:3000"
    networks:
      - "3-health-checks-and-graceful-degradation"

networks:
  "3-health-checks-and-graceful-degradation":
    name: "3-health-checks-and-graceful-degradation"
